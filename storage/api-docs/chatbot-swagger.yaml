  # ────────────────────────────────────────────────────────────────────────────
  /chatbot/dismiss:
    post:
      tags: [Lifecycle]
      summary: Dismiss the chatbot widget
      operationId: chatbotDismiss
      description: |
        Called when the user clicks the **close (×) button** on the chatbot.

        ### Client behaviour
        1. `chatbot_dismissed_at` is written to `localStorage` with the current ISO timestamp.
        2. This endpoint is called **fire-and-forget** (errors are silently caught).
        3. The widget collapses to the FAB (minimized state).
        4. On the next page load the 3-second auto-open timer checks `chatbot_dismissed_at`:
           - If < 24 hours ago → session is initialized but widget stays minimized.
           - If ≥ 24 hours ago → widget opens normally again.

        ### Backend use-case
        The backend can use this signal to:
        - Record churn metrics per session.
        - Avoid sending push notifications during the 24-hour window.
        - Update `last_seen_at` for the session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_token]
              properties:
                session_token:
                  type: string
                  description: Active session token.
                  example: "8f14e45f-ceea-467a-a866-8f8339d99999"
      responses:
        '200':
          description: Dismiss event recorded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "Session dismissed."
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ────────────────────────────────────────────────────────────────────────────
  /chatbot/link-answers:
    post:
      tags: [Lifecycle]
      summary: Link anonymous session answers to an authenticated user
      operationId: chatbotLinkAnswers
      description: |
        Associates an **anonymous** chatbot session (and its quiz answers) with a
        registered/logged-in user account.

        Both **unauthenticated and authenticated** users can use the chatbot.
        This endpoint is the bridge that converts an anonymous session into a
        user-owned session after login or registration.

        ### When is this called? (automatic — no user action needed)
        The frontend watches for `userId` changes in the auth context.
        The moment the user logs in or registers, if a `session_token` already exists
        in `localStorage`, this endpoint is called automatically:

        ```
        User was chatting anonymously (session_token in localStorage)
            │
            │  User logs in / registers
            ▼
        userId changes from null → 101  (detected via useEffect in useChatbot)
            │
            ▼
        POST /chatbot/link-answers { session_token: "<token>", user_id: 101 }
            │                                                  (fire & forget)
            ▼
        Session + quiz answers now owned by user 101
        ```

        ### What does the backend do?
        - Finds the session by `session_token`.
        - Attaches `user_id` to the session record.
        - The quiz answers are now linked to the user profile, enabling:
          - Personalised recommendations on future visits (even without the chatbot token).
          - Pre-filling of the quiz if the user chats again from a different device.
          - Analytics tied to real users instead of anonymous sessions.

        ### Error handling
        If this call fails (network error, session not found) the client ignores the
        error silently — the session is still valid for the current browser.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_token, user_id]
              properties:
                session_token:
                  type: string
                  description: The anonymous session token from localStorage.
                  example: "8f14e45f-ceea-467a-a866-8f8339d99999"
                user_id:
                  type: integer
                  description: The authenticated user's ID.
                  example: 101
      responses:
        '200':
          description: Session successfully linked to user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: "Session linked to user."
        '404':
          description: Session token not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                message: "Session not found."
        '422':
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
